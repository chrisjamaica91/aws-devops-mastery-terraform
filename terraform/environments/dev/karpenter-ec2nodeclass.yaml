apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: default
  namespace: karpenter
spec:
  # AMI selection (EKS-optimized AMI)
  amiFamily: AL2  # Amazon Linux 2 EKS-optimized
  
  # Subnet selection (Karpenter will launch nodes in these subnets)
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: aws-devops-mastery-dev  # Tag from VPC module
  
  # Security group selection
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: aws-devops-mastery-dev  # Tag from EKS cluster SG
  
  # IAM role for nodes
  role: aws-devops-mastery-dev-karpenter-node  # From Terraform karpenter.tf
  
  # User data (bootstrap script for EKS)
  userData: |
    #!/bin/bash
    /etc/eks/bootstrap.sh aws-devops-mastery-dev \
      --kubelet-extra-args '--max-pods=110'
  
  # Block device mappings (root volume)
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 20Gi
        volumeType: gp3
        iops: 3000
        throughput: 125
        encrypted: true
        deleteOnTermination: true
  
  # Metadata options (IMDSv2 required for security)
  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 2
    httpTokens: required  # IMDSv2 only
  
  # Tags applied to EC2 instances
  tags:
    Name: karpenter-node
    Environment: dev
    ManagedBy: karpenter
    Cluster: aws-devops-mastery-dev