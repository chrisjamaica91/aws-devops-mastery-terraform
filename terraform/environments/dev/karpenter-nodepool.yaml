apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: general-purpose
  namespace: karpenter
spec:
  # Template for nodes Karpenter will create
  template:
    metadata:
      # Labels applied to nodes
      labels:
        workload-type: general
        managed-by: karpenter
        environment: dev
    
    spec:
      # Reference to EC2NodeClass (defines AWS-specific config)
      nodeClassRef:
        name: default
      
      # Requirements for node selection
      requirements:
        # Instance families (flexible)
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values:
            - t3
            - t3a
            - t2
        
        # Instance sizes
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values:
            - medium
            - large
            - xlarge
        
        # Architecture
        - key: kubernetes.io/arch
          operator: In
          values:
            - amd64
        
        # Capacity type (Spot preferred for cost savings)
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - spot
            - on-demand
        
        # Availability zones (multi-AZ)
        - key: topology.kubernetes.io/zone
          operator: In
          values:
            - us-east-2a
            - us-east-2b
      
      # Taints (optional - force pods to explicitly tolerate Karpenter nodes)
      # taints:
      #   - key: karpenter
      #     value: "true"
      #     effect: NoSchedule
  
  # Disruption controls (node consolidation and replacement)
  disruption:
    # Consolidation - bin-pack pods onto fewer nodes
    consolidationPolicy: WhenUnderutilized
    
    # Budget for disruptions (prevent mass node churn)
    budgets:
      - nodes: "10%"  # Max 10% of nodes can be disrupted at once
  
  # Limits (prevent runaway scaling)
  limits:
    cpu: "100"      # Max 100 vCPUs across all Karpenter nodes
    memory: 200Gi   # Max 200GB memory
  
  # Weight (priority when multiple NodePools exist)
  weight: 10