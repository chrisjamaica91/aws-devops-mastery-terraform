# ============================================================================
# Dev Environment - Apply
# ============================================================================
# Trigger: After PR merges to main
# Approval: None (auto-deploy for fast iteration)
# ============================================================================

name: Dev Environment - Apply

on:
  push:
    branches: [main]
    paths:
      - 'terraform/environments/dev/**'
      - 'terraform/modules/**'

jobs:
  apply:
    name: Apply Changes
    environment: dev  # No approval required (set in GitHub Settings)
    uses: ./.github/workflows/terraform-apply-reusable.yaml
    with:
      environment: dev
      terraform-dir: terraform/environments/dev
    secrets: inherit