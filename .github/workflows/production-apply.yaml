# ============================================================================
# Production Environment - Apply
# ============================================================================
# Trigger: After PR merges to main
# Approval: 2 people required (set in GitHub Settings → Environments)
# Wait: 5-minute cool-down after approval (set in GitHub Settings)
# ============================================================================

name: Production Environment - Apply

on:
  push:
    branches: [main]
    paths:
      - 'terraform/environments/production/**'
      - 'terraform/modules/**'

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    uses: ./.github/workflows/terraform-apply-reusable.yaml
    with:
      environment: production
      terraform-dir: terraform/environments/production
    secrets: inherit