# ============================================================================
# DEV Environment - Terraform Plan Workflow
# ============================================================================
# PURPOSE: Fast security checks when someone wants to change dev infrastructure
# RUNS: When a Pull Request changes files in environments/dev/
# TIME: ~2-3 minutes (optimized for developer speed)
# ============================================================================

name: Dev Environment - Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/environments/dev/**'
      - 'terraform/modules/**'
      - '.github/workflows/dev-plan.yml'

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

env:
  TERRAFORM_DIR: terraform/environments/dev
  AWS_REGION: us-east-2

jobs:
  terraform-plan:
    name: Scan & Plan Dev Infrastructure
    runs-on: ubuntu-latest

    steps:
      # ========================================
      # STEP 1: Get the code
      # ========================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ========================================
      # STEP 2: Install Terraform
      # ========================================
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      # ========================================
      # STEP 3: Authenticate to AWS via OIDC
      # ========================================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::737026300147:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      # ========================================
      # STEP 4: Initialize Terraform
      # ========================================
      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init

      # ========================================
      # STEP 5: Scan for Secrets
      # ========================================
      - name: Run gitleaks (Secret Detection)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ========================================
      # STEP 6: Terraform Linting
      # ========================================
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.0

      - name: Run TFLint
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          tflint --init
          tflint --format compact

      # ========================================
      # STEP 7: Security Scanning (Basic)
      # ========================================
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ env.TERRAFORM_DIR }}
          soft_fail: false
          format: default
          additional_args: --minimum-severity MEDIUM

      # ========================================
      # STEP 8: Validate Terraform Syntax
      # ========================================
      - name: Terraform Validate
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform validate

      # ========================================
      # STEP 9: Check Code Formatting
      # ========================================
      - name: Terraform Format Check
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform fmt -check -recursive

      # ========================================
      # STEP 10: Create Terraform Plan
      # ========================================
      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true
      # ========================================
      # STEP 11: Capture Plan Output
      # ========================================
      - name: Save Plan Output
        if: always()
        run: |
          echo "PLAN_OUTPUT<<EOF" >> $GITHUB_ENV
          cat ${{ env.TERRAFORM_DIR }}/plan_output.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # ========================================
      # STEP 12: Setup Infracost
      # ========================================
      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      # ========================================
      # STEP 13: Generate Cost Estimate
      # ========================================
      - name: Generate Infracost Breakdown
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          infracost breakdown --path tfplan \
            --format json \
            --out-file infracost.json

      # ========================================
      # STEP 14: Post Results to PR
      # ========================================
      - name: Comment PR with Results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = process.env.PLAN_OUTPUT || 'Plan output not available';
            const infracost = fs.existsSync('${{ env.TERRAFORM_DIR }}/infracost.json') 
              ? JSON.parse(fs.readFileSync('${{ env.TERRAFORM_DIR }}/infracost.json', 'utf8'))
              : null;
            
            let comment = `## 🏗️ Dev Environment Terraform Plan\n\n`;
            comment += `### 📋 Plan Output\n\`\`\`terraform\n${planOutput}\n\`\`\`\n\n`;
            
            if (infracost && infracost.totalMonthlyCost) {
              comment += `### 💰 Cost Estimate\n`;
              comment += `**Monthly Cost:** $${infracost.totalMonthlyCost}\n`;
              comment += `**Cost Change:** ${infracost.diffTotalMonthlyCost > 0 ? '+' : ''}$${infracost.diffTotalMonthlyCost}/month\n\n`;
            }
            
            comment += `### ✅ Next Steps\n`;
            comment += `- Review the plan output above\n`;
            comment += `- Check cost estimates\n`;
            comment += `- Approve if changes look correct\n`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      # SECTION 20: Check if plan failed and fail workflow if it did
      - name: Check Plan Result
        if: steps.plan.outcome == 'failure'
        run: |
          echo "❌ Terraform plan failed. Please review the errors above."
          exit 1

      # SECTION 21: Upload plan file for apply workflow
      - name: Upload Plan Artifact
        if: steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: dev-tfplan
          path: terraform/environments/dev/tfplan
          retention-days: 30

      # SECTION 22: Create workflow summary (visible in Actions tab)
      - name: Generate Workflow Summary
        if: always()
        run: |
          echo "## 🏗️ Dev Environment - Terraform Plan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.plan.outcome }}" == "success" ]; then
            echo "✅ **Plan Status:** Success" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Plan Status:** Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Security Scans" >> $GITHUB_STEP_SUMMARY
          echo "- 🔐 Secrets Detection (gitleaks): ${{ steps.gitleaks.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🔍 Terraform Linting (TFLint): ${{ steps.tflint.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🛡️ Security Scanning (tfsec): ${{ steps.tfsec.outcome }}" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Validation" >> $GITHUB_STEP_SUMMARY
          echo "- ✔️ Terraform Validate: ${{ steps.validate.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- 📝 Format Check: ${{ steps.fmt.outcome }}" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "_View detailed results in the PR comment above._" >> $GITHUB_STEP_SUMMARY
