# ============================================================================
# DEV Environment - Terraform Plan Workflow
# ============================================================================
# PURPOSE: Fast security checks when someone wants to change dev infrastructure
# RUNS: When a Pull Request changes files in environments/dev/
# TIME: ~2-3 minutes (optimized for developer speed)
# ============================================================================

name: Dev Environment - Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/environments/dev/**"
      - "terraform/modules/**"
      - ".github/workflows/**"

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

env:
  TERRAFORM_DIR: terraform/environments/dev
  AWS_REGION: us-east-2

jobs:
  # ============================================================================
  # JOB 1: SECRETS SCANNING
  # ============================================================================
  # Runs independently in parallel with other security checks
  # Duration: ~5-10 seconds
  # ============================================================================
  secrets-scan:
    name: 🔐 Detect Secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch full git history for gitleaks to scan commit range

      - name: Run gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # JOB 2: TERRAFORM LINTING
  # ============================================================================
  # Checks Terraform syntax and best practices
  # Duration: ~15-20 seconds
  # ============================================================================
  lint:
    name: 🔍 Lint Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.0

      - name: Run TFLint
        id: tflint
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          tflint --init
          tflint --format compact

  # ============================================================================
  # JOB 3: SECURITY SCANNING
  # ============================================================================
  # Scans for security misconfigurations (AWS-specific issues)
  # Duration: ~20-30 seconds
  # ============================================================================
  security:
    name: 🛡️ Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init

      - name: Run tfsec
        id: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ env.TERRAFORM_DIR }}
          soft_fail: false
          format: default
          additional_args: --minimum-severity MEDIUM

  # ============================================================================
  # JOB 4: TERRAFORM PLAN
  # ============================================================================
  # Waits for all security scans to pass, then creates the plan
  # Duration: ~60 seconds
  # ============================================================================
  terraform-plan:
    name: 📋 Plan Infrastructure Changes
    runs-on: ubuntu-latest
    needs: [secrets-scan, lint, security] # 🔥 WAITS for all 3 jobs to pass!

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::737026300147:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init

      - name: Terraform Validate
        id: validate
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform validate

      - name: Terraform Format Check
        id: fmt
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Save Plan Output
        if: always()
        run: |
          echo "PLAN_OUTPUT<<EOF" >> $GITHUB_ENV
          if [ -f "${{ env.TERRAFORM_DIR }}/plan_output.txt" ]; then
            cat ${{ env.TERRAFORM_DIR }}/plan_output.txt >> $GITHUB_ENV
          else
            echo "Plan output not available - terraform plan may have failed during initialization" >> $GITHUB_ENV
          fi
          echo "EOF" >> $GITHUB_ENV

      - name: Setup Infracost
        if: steps.plan.outcome == 'success'
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Infracost Breakdown
        if: steps.plan.outcome == 'success'
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          infracost breakdown --path tfplan \
            --format json \
            --out-file infracost.json

      # ========================================
      # Post comprehensive results to PR
      # ========================================
      - name: Comment PR with Results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = process.env.PLAN_OUTPUT || 'Plan output not available';
            const infracost = fs.existsSync('${{ env.TERRAFORM_DIR }}/infracost.json') 
              ? JSON.parse(fs.readFileSync('${{ env.TERRAFORM_DIR }}/infracost.json', 'utf8'))
              : null;

            // Build comprehensive comment with ALL job results
            let comment = `## 🏗️ Dev Environment Terraform Plan\n\n`;

            // Security scan results from OTHER jobs
            comment += `### 🔒 Security Scan Results\n`;
            comment += `- 🔐 Secrets Detection: **${{ needs.secrets-scan.result }}**\n`;
            comment += `- 🔍 Terraform Linting: **${{ needs.lint.result }}**\n`;
            comment += `- 🛡️ Security Scanning: **${{ needs.security.result }}**\n\n`;

            // Validation results from THIS job
            comment += `### ✅ Validation\n`;
            comment += `- Terraform Validate: **${{ steps.validate.outcome }}**\n`;
            comment += `- Format Check: **${{ steps.fmt.outcome }}**\n\n`;

            // Plan output
            comment += `### 📋 Plan Output\n\`\`\`terraform\n${planOutput}\n\`\`\`\n\n`;

            // Cost estimate
            if (infracost && infracost.totalMonthlyCost) {
              comment += `### 💰 Cost Estimate\n`;
              comment += `**Monthly Cost:** $${infracost.totalMonthlyCost}\n`;
              comment += `**Cost Change:** ${infracost.diffTotalMonthlyCost > 0 ? '+' : ''}$${infracost.diffTotalMonthlyCost}/month\n\n`;
            }

            // Next steps
            comment += `### ✅ Next Steps\n`;
            comment += `- Review the plan output above\n`;
            comment += `- Check cost estimates\n`;
            comment += `- Approve if changes look correct\n`;

            // Post the comment
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      # ========================================
      # Error handling
      # ========================================
      - name: Check Plan Result
        if: steps.plan.outcome == 'failure'
        run: |
          echo "❌ Terraform plan failed. Please review the errors above."
          exit 1

      - name: Upload Plan Artifact
        if: steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: dev-tfplan
          path: terraform/environments/dev/tfplan
          retention-days: 30

      # ========================================
      # Workflow summary
      # ========================================
      - name: Generate Workflow Summary
        if: always()
        run: |
          echo "## 🏗️ Dev Environment - Terraform Plan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Plan status
          if [ "${{ steps.plan.outcome }}" == "success" ]; then
            echo "✅ **Plan Status:** Success" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Plan Status:** Failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Security Scans (Parallel Execution)" >> $GITHUB_STEP_SUMMARY
          echo "- 🔐 Secrets Detection: ${{ needs.secrets-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🔍 Terraform Linting: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🛡️ Security Scanning: ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Validation" >> $GITHUB_STEP_SUMMARY
          echo "- ✔️ Terraform Validate: ${{ steps.validate.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- 📝 Format Check: ${{ steps.fmt.outcome }}" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "_⚡ Total runtime: ~60-90 seconds (parallel execution)_" >> $GITHUB_STEP_SUMMARY
