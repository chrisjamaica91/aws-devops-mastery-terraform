name: Dev Environment - Plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/environments/dev/**'
      - 'terraform/modules/**'

jobs:
  plan:
    uses: ./.github/workflows/terraform-plan-reusable.yaml
    with:
      environment: dev
      terraform-dir: terraform/environments/dev
      run-checkov: false
      run-terrascan: false
    secrets: inherit  # Passes all secrets to reusable workflow
